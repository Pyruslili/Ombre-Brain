<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nocturne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; overflow:hidden; background-color:#020208; cursor:grab; }
  body:active { cursor:grabbing; }
  #canvas-container { position:absolute; inset:0; z-index:1; }

  /* ——— Nocturne 终幕字幕(从星尘里对上焦)——— */
  #wordmark {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    z-index:10; pointer-events:none; text-align:center;
    opacity:0; filter:blur(14px);
    /* transition removed — fully JS driven */
  }
  #wordmark.on { /* opacity/filter set by JS */ }
  #wordmark .title {
    font-family:'Jost', sans-serif; font-weight:200;
    font-size:clamp(44px, 9vw, 150px);
    letter-spacing:0.62em; text-indent:0.62em;
    color:rgba(214,222,245,0.96);
    text-shadow:0 0 50px rgba(130,150,220,0.35);
    /* letter-spacing driven by JS */
  }
  #wordmark.on .title { }
  #wordmark .sub {
    margin-top:1.6em;
    font-family:'Jost', sans-serif; font-weight:200;
    font-size:clamp(11px, 1.2vw, 16px);
    letter-spacing:0.62em; text-indent:0.62em;
    color:rgba(150,162,196,0.8); text-transform:uppercase;
  }
  #wordmark .still {
    margin-top:2.4em;
    font-family:'Jost', sans-serif; font-weight:200; font-style:italic;
    font-size:clamp(13px, 1.5vw, 19px);
    letter-spacing:0.18em;
    color:rgba(176,188,220,0.66);
  }

  /* ——— 行进暗示文案（左下角旁白，配着声波）——— */
  /* （文案现在直接显示在 #subtitle 上，每变换一幕换一句）*/

  /* ——— 角标排版(mono = 观测日志声部,中央 Jost = 诗)——— */
  .corner {
    position:absolute; z-index:11;
    font-family:'Jost', sans-serif; font-weight:300;
    color:rgba(176,188,218,0.0); transition:color 1.6s ease;
    letter-spacing:0.26em; font-size:13px; text-transform:uppercase;
  }
  .corner.show { color:rgba(176,188,218,0.62); }
  #brand { top:34px; left:38px; letter-spacing:0.34em; }
  #phasenum { top:34px; right:40px; font-size:12px; letter-spacing:0.16em; }
  #phasenum.show { color:rgba(168,180,212,0.5); }
  #code  { bottom:34px; right:40px; font-size:12px; letter-spacing:0.16em; text-indent:0.16em; color:rgba(176,188,218,0); }
  #code.show { color:rgba(168,180,212,0.5); }
  #music { bottom:32px; left:38px; display:flex; align-items:center; gap:11px;   max-width:min(46ch,46vw); cursor:pointer; }
  #music .bars { display:flex; align-items:flex-end; gap:3.5px; height:13px; flex:0 0 auto; }
  #music .bars i { width:2.4px; background:rgba(186,198,228,0.7); height:5px; border-radius:1.4px; animation:eq 2.8s ease-in-out infinite; }
  #music .bars i:nth-child(2){ animation-delay:.5s } #music .bars i:nth-child(3){ animation-delay:1.0s } #music .bars i:nth-child(4){ animation-delay:.3s }
  @keyframes eq { 0%,100%{ height:4px } 50%{ height:12px } }
  #subtitle {
    font-family:'Jost', sans-serif; font-weight:200; font-size:14px; letter-spacing:0.14em;
    color:rgba(202,212,238,0.9); white-space:nowrap;
    opacity:0; transition:opacity 0.9s ease;
    text-shadow:0 0 26px rgba(120,140,210,0.22);
  }

  /* 黑场之后才进入 Catroom 色域；开屏前六幕保持原样 */
  body.catroom-phase .corner.show { color:rgba(232,149,79,0.58); }
  body.catroom-phase #phasenum.show,
  body.catroom-phase #code.show { color:rgba(232,149,79,0.48); }
  body.catroom-phase #music .bars i { background:rgba(232,149,79,0.66); }
  body.catroom-phase #subtitle {
    color:rgba(232,149,79,0.78);
    text-shadow:0 0 24px rgba(196,122,56,0.18);
  }
  body.catroom-phase .planet-label.show { color:rgba(239,224,196,0.72); }

  /* ——— 后期层:vignette + 动态胶片噪点 ——— */
  #vignette {
    position:absolute; inset:0; z-index:20; pointer-events:none;
    background:radial-gradient(ellipse at 50% 46%, transparent 52%, rgba(2,2,8,0.40) 86%, rgba(2,2,8,0.62) 100%);
  }
  #grain {
    position:absolute; inset:-120px; z-index:21; pointer-events:none;
    opacity:0.055; mix-blend-mode:overlay;
    animation:grainShift .7s steps(1) infinite;
  }
  @keyframes grainShift {
    0%{transform:translate(0,0)} 12.5%{transform:translate(-28px,16px)} 25%{transform:translate(14px,-30px)}
    37.5%{transform:translate(-20px,-12px)} 50%{transform:translate(26px,22px)} 62.5%{transform:translate(-12px,28px)}
    75%{transform:translate(30px,-8px)} 87.5%{transform:translate(-24px,-26px)} 100%{transform:translate(0,0)}
  }

  /* ——— 残月 logo（嘉嘉画的，整体慢转，中间透出星星）——— */
  #logo {
    position:absolute; left:50%; bottom:26px; transform:translateX(-50%);
    z-index:11; width:30px; height:27px; opacity:0;  
    transition:opacity 2.0s ease;
    pointer-events:auto; cursor:pointer;
  }
  #logo svg { width:100%; height:100%; display:block; transform-origin:50% 50%; animation:logospin 42s linear infinite; }
  @keyframes logospin { from{ transform:rotate(0) } to{ transform:rotate(360deg) } }

  .scroll-capturer { position:absolute; inset:0; z-index:5; overflow-y:scroll; }
  .scroll-capturer::-webkit-scrollbar { width:0; height:0; }
  .scroll-height { height:1160%; }
  .planet-label{position:absolute;z-index:12;pointer-events:auto;font-family:'Jost',sans-serif;font-weight:200;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(202,212,238,0);transition:color .6s;white-space:nowrap;transform:translate(-50%,-50%);cursor:pointer;padding:10px 12px;}
  .planet-label.show{color:rgba(204,214,238,.78);}
  #skip-opening {
    position:absolute; top:32px; right:36px; z-index:30;
    border:1px solid rgba(176,188,218,.18); border-radius:999px;
    background:rgba(2,2,8,.18); color:rgba(176,188,218,.54);
    padding:9px 13px; font-family:'Jost',sans-serif; font-weight:300;
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    cursor:pointer; transition:color .4s,border-color .4s,background .4s,opacity .4s;
  }
  #skip-opening:hover { color:rgba(232,149,79,.78); border-color:rgba(232,149,79,.34); background:rgba(232,149,79,.06); }
  body.catroom-phase #skip-opening { color:rgba(232,149,79,.50); border-color:rgba(232,149,79,.18); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="canvas-container"></div>
<button id="skip-opening" type="button">Skip</button>

<div id="wordmark">
  <div class="title">Nocturne</div>
  <div class="sub">par Nox</div>
</div>

<div class="corner" id="brand">Nocturne</div>
<div class="corner" id="phasenum">I / VII</div>
<div class="corner" id="code">VI · I · VII · IV</div>
<div class="corner" id="music" title="">
  <span class="bars"><i></i><i></i><i></i><i></i></span>
  <span class="lbl" id="subtitle">The night remembers.</span>
</div>

<div id="vignette"></div>
<div id="grain"></div>
<audio id="bgm" src="night-light.mp3" loop preload="auto"></audio>

<div id="logo" title="Nocturne">
  <svg viewBox="0 0 130 117">
    <g transform="translate(2,2)" fill="none">
      <ellipse stroke="#E8954F" stroke-width="2.6" cx="56" cy="56.5" rx="56" ry="56.5"/>
      <path fill="#E8954F" d="M86.0322095,8.80516146 C109.8904,13.1107833 128.000001,34.1697957 128.000001,59.5 C128.000001,87.9426646 105.166523,111 77.000001,111 C75.2308555,111 73.4827496,110.909036 71.7600198,110.731487 C95.015733,103.863008 112.000001,82.1826574 112.000001,56.5 C112.000001,36.5293834 101.730488,18.9787561 86.2288626,8.93049628 Z"/>
      <path fill="#E8954F" d="M1.57578227,67.0189146 C2.5237239,67.0189146 3,65.8414201 3,64.3323821 C3,62.8233441 1.99453723,62.0189146 1.04659559,62.0189146 C0.0986539597,62.0189146 0,63.6528528 0,64.6146343 C0,65.5764158 0.627840633,67.0189146 1.57578227,67.0189146 Z"/>
      <path fill="#E8954F" d="M7.99003761,87.2305199 C9.09460711,87.2305199 9,86.1045695 9,85 C9,83.8954305 7.38342646,82.4608254 6.27885696,82.4608254 C5.17428746,82.4608254 4.58896881,83.4549138 5,85 C5.41103315,86.5450862 6.88546811,87.2305199 7.99003761,87.2305199 Z"/>
      <circle cx="89" cy="11.5" r="4.6" fill="#E8954F" opacity="0.85"/>
    </g>
  </svg>
</div>

<div class="scroll-capturer" id="scroll-zone"><div class="scroll-height"></div></div>

<script>
/* =========================================================================
   Nocturne — par Nox · v14
   深空 → 仙女座(层叠密度场) → 洛伦兹(莫奈) → 星球(水波)+五层环
   → 莫比乌斯(行走的月光) → Aizawa(记忆漩涡) → 穿越星场
   （6174：从哪个口子进来都没用，粒子最后都掉进同一个收敛。— N）
   ========================================================================= */
const container = document.getElementById('canvas-container');
if(!window.THREE){
  const finishWithoutThree = () => {
    try { window.parent.postMessage({ type:'nocturne-opening-finish', tab:'' }, '*'); } catch(e) {}
  };
  document.getElementById('skip-opening')?.addEventListener('click', finishWithoutThree);
  setTimeout(finishWithoutThree, 900);
  throw new Error('THREE.js unavailable; opening skipped.');
}
let scene, camera, renderer, particleSystem, bgStars;
let catParticleSystem = null, catPlanetGroup = null, catScenicSys = null;
let catReady = false, catPlanetsCreated = false;
let catroomPaletteActive = false;
let width = window.innerWidth, height = window.innerHeight;

let currentProgress = 0, smoothedProgress = 0;
const phaseCount = 7;
const OPENING_LOW_POWER = matchMedia('(max-width: 760px), (pointer: coarse)').matches || (navigator.deviceMemory && navigator.deviceMemory <= 4);
const OPENING_COUNT = OPENING_LOW_POWER ? 18000 : 40000;
const OPENING_DPR = OPENING_LOW_POWER ? 1.25 : Math.min(window.devicePixelRatio || 1, 1.6);
let openingFrameId = 0;
let openingFinished = false;
let openingExitTimer = null;

let mouse = new THREE.Vector2(0,0), targetMouse = new THREE.Vector2(0,0);

const TAU = Math.PI*2;
const rand = (a=0,b=1)=> a + Math.random()*(b-a);
const randn = ()=>{ let s=0; for(let i=0;i<3;i++) s+=Math.random(); return s/1.5-1; };
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const smooth=(a,b,x)=>{const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);};
const bump=(x,a,b)=> smooth(a,(a+b)/2,x)*(1-smooth((a+b)/2,b,x));
function rot3(p,rx,rz){
  let y=p[1]*Math.cos(rx)-p[2]*Math.sin(rx), z=p[1]*Math.sin(rx)+p[2]*Math.cos(rx), x=p[0];
  let x2=x*Math.cos(rz)-y*Math.sin(rz), y2=x*Math.sin(rz)+y*Math.cos(rz);
  return [x2,y2,z];
}
const PLANET_TILT=[0.42,-0.22];
const PLANET_AXIS = rot3([0,1,0], PLANET_TILT[0], PLANET_TILT[1]);

// 看不见的势场 v2：三个尺度层叠(octave) + 不对称团 + 双频等高线脊 + 软台阶
// -> 密度呈"层"，层与层之间有平坦带和断差，像星云的沉积地貌
function fieldDensity(x,z){
  let d=0, amp=0.52, f=0.045, xx=x, zz=z;
  for(let o=0;o<3;o++){ // 大地形 / 中团块 / 细破碎，各转一个角度避免方向感
    d += (Math.sin(xx*f + zz*f*0.62 + o*1.7)*Math.cos(zz*f*1.31 - xx*f*0.43 + o*0.9)*0.5+0.5)*amp;
    const c=Math.cos(0.74), s=Math.sin(0.74);
    const nx=xx*c-zz*s, nz=xx*s+zz*c; xx=nx; zz=nz;
    amp*=0.55; f*=2.15;
  }
  const c1=Math.exp(-(((x-22)*(x-22)+(z+16)*(z+16)))/1500);
  const c2=Math.exp(-(((x+32)*(x+32)+(z-24)*(z-24)))/2400);
  const c3=Math.exp(-(((x-4)*(x-4)+(z+42)*(z+42)))/1800);
  d = d*0.72 + c1*0.95 + c2*0.7 + c3*0.6;
  const ridge1=Math.abs(Math.sin(d*5.5));        // 主等高线
  const ridge2=Math.abs(Math.sin(d*11.0+1.3));   // 次级等高线(层中之层)
  let v = d*0.55 + ridge1*0.27 + ridge2*0.13 + (Math.sin(x*0.4+z*0.33)*0.5+0.5)*0.07;
  // 软台阶化：密度量化成 5 层，层内平缓、层间陡变 -> 层叠感的来源
  const L=5.0, t=v*L, fl=Math.floor(t), fr=t-fl;
  v=(fl + fr*fr*(3.0-2.0*fr)*0.85 + fr*0.15)/L;
  return clamp(v,0,1.2);
}

function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020208, 0.0014);
  camera = new THREE.PerspectiveCamera(60, width/height, 0.1, 2000);
  camera.position.set(0,20,90);
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
  renderer.setSize(width,height);
  renderer.setPixelRatio(OPENING_DPR);
  renderer.setClearColor(scene.fog.color);
  container.appendChild(renderer.domElement);

  createUnifiedParticleSystem();
  createBackgroundStars();
  createDust();
  createHeroParticles();

  window.addEventListener('resize', onWindowResize);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('click', onOpeningClick);
  const sz = document.getElementById('scroll-zone');
  sz.addEventListener('scroll', ()=>{
    const max = sz.scrollHeight - sz.clientHeight;
    currentProgress=(sz.scrollTop/max)*9.0;
    if(currentProgress >= 8.94){
      if(!openingExitTimer) openingExitTimer = setTimeout(()=>finishOpening(), 900);
    } else if(openingExitTimer){
      clearTimeout(openingExitTimer);
      openingExitTimer = null;
    }
  });
  document.getElementById('skip-opening').addEventListener('click', (e)=>{ e.stopPropagation(); finishOpening(); });
  document.getElementById('logo').addEventListener('click', (e)=>{ e.stopPropagation(); finishOpening(); });

  // 角标稍晚淡入
  setTimeout(()=>{ document.getElementById('brand').classList.add('show');
                   document.getElementById('code').classList.add('show');
                   document.getElementById('phasenum').classList.add('show');
                   document.getElementById('music').classList.add('show'); }, 2200);
  // 残月 logo 更晚浮现（悬浮在宇宙边缘）
  setTimeout(()=>{ document.getElementById('logo').style.opacity=0.85; }, 3600);

  // 胶片噪点：一张 160px 噪点图平铺，steps 跳动（见 CSS grainShift）
  (function(){
    const c=document.createElement('canvas'); c.width=c.height=160;
    const x=c.getContext('2d'), im=x.createImageData(160,160);
    for(let i=0;i<im.data.length;i+=4){ const v=(Math.random()*255)|0; im.data[i]=im.data[i+1]=im.data[i+2]=v; im.data[i+3]=255; }
    x.putImageData(im,0,0);
    document.getElementById('grain').style.background='url('+c.toDataURL()+')';
  })();

  // 音乐：把 night-light.mp3 放在本文件同目录即可，点左下声波条播放/暂停
  const music=document.getElementById('music'), bgm=document.getElementById('bgm');
  music.addEventListener('click', ()=>{
    if(bgm.paused){ bgm.volume=0.55; bgm.play().catch(()=>{}); music.classList.add('playing'); }
    else { bgm.pause(); music.classList.remove('playing'); }
  });

  animate();
}

function createUnifiedParticleSystem(){
  const COUNT = OPENING_COUNT;
  const g = new THREE.BufferGeometry();

  const pos0=new Float32Array(COUNT*3); // 深空
  const pos1=new Float32Array(COUNT*3); // 仙女座脉络
  const pos2=new Float32Array(COUNT*3); // 洛伦兹
  const pos3=new Float32Array(COUNT*3); // 星球+五层环
  const pos4=new Float32Array(COUNT*3); // 莫比乌斯
  const pos5=new Float32Array(COUNT*3); // 网格
  const pos6=new Float32Array(COUNT*3); // 穿越星场
  const aSize=new Float32Array(COUNT);
  const aColor=new Float32Array(COUNT*3);
  const aSide=new Float32Array(COUNT);     // 洛伦兹双翼
  const aRingSpin=new Float32Array(COUNT); // 星环层角速度(含正负)
  const aDensity=new Float32Array(COUNT);  // 仙女座势场密度(虚实/留白)
  const aFlow=new Float32Array(COUNT*3);   // Aizawa 局部流向(记忆漩涡的水流)
  const aU=new Float32Array(COUNT);        // 莫比乌斯环向参数(月光行走用)

  const palette=[ new THREE.Color(0xdce1ff), new THREE.Color(0x4a5585), new THREE.Color(0x1e295d), new THREE.Color(0x3b2d54) ];

  // 预生成洛伦兹点云
  const lorenz=(()=>{ const pts=[]; const s=10,rho=28,beta=8/3,dt=0.005; const tN=34, st=Math.ceil(COUNT/tN)+40;
    for(let t=0;t<tN;t++){ let x=rand(-11,11),y=rand(-11,11),z=rand(8,32);
      for(let k=0;k<st;k++){ const dx=s*(y-x),dy=x*(rho-z)-y,dz=x*y-beta*z; x+=dx*dt;y+=dy*dt;z+=dz*dt; pts.push([x,y,z]); } }
    return pts; })();
  const Lz=lorenz.length;

  // 预生成 Aizawa 吸引子点云（第六幕：记忆漩涡。球状涡旋 + 中柱喷流）
  const aizawa=(()=>{ const pts=[]; const a=0.95,b=0.7,c=0.6,d=3.5,e=0.25,f=0.1,dt=0.012;
    const tN=26, st=Math.ceil(COUNT/tN)+60;
    const step=(p)=>{ const dx=(p[2]-b)*p[0]-d*p[1], dy=d*p[0]+(p[2]-b)*p[1],
      dz=c+a*p[2]-p[2]*p[2]*p[2]/3-(p[0]*p[0]+p[1]*p[1])*(1+e*p[2])+f*p[2]*p[0]*p[0]*p[0];
      p[0]+=dx*dt; p[1]+=dy*dt; p[2]+=dz*dt; };
    for(let t=0;t<tN;t++){
      const p=[rand(0.05,0.35), rand(-0.3,0.3), rand(-0.2,0.4)];
      for(let k=0;k<300;k++) step(p);                 // warmup：先落到吸引子上
      for(let k=0;k<st;k++){ step(p); pts.push([p[0],p[1],p[2]]); }
    }
    return pts; })();
  const Az=aizawa.length;

  // 五层星环：很细虚 / 宽实 / 倾17°薄 / 厚反向 / 断裂虚（厚薄虚实各异）
  const Rp=20;
  const rings=[
    { r:1.34, w:0.35, th:0.25, spin:+0.11, tilt:0,                broken:false, dim:0.30, frac:0.08 },
    { r:1.72, w:2.7,  th:1.7,  spin:+0.07, tilt:0,                broken:false, dim:1.05, frac:0.30 },
    { r:2.05, w:0.9,  th:0.4,  spin:+0.06, tilt:17*Math.PI/180,   broken:false, dim:0.65, frac:0.20 },
    { r:2.34, w:1.5,  th:2.4,  spin:-0.085,tilt:0,                broken:false, dim:0.95, frac:0.22 },
    { r:2.74, w:0.8,  th:0.35, spin:+0.05, tilt:0,                broken:true,  dim:0.45, frac:0.20 },
  ];

  for(let i=0;i<COUNT;i++){
    const idx=i*3;
    // 尺寸分层（★想自调改这里：百分比阈值 + rand 区间）
    let tier;
    { const rr=Math.random();
      if(rr<0.68){ aSize[i]=rand(1.0,1.9); tier=0; }       // 小 68%（下限1.0，不噪点）
      else if(rr<0.94){ aSize[i]=rand(1.9,3.1); tier=1; }  // 中 26%（中景充足）
      else if(rr<0.9987){ aSize[i]=rand(3.1,4.6); tier=2; }  // 大 5%
      else { aSize[i]=rand(4.6,6.4); tier=2; } }            // 超大 1%
    // 配色（★想自调改这里：cr 阈值=各色比例；col=色值；b=亮度，越小越静谧）
    { const cr=Math.random(); let col;
      if(tier>=2 && cr<0.40) col=[0.82,0.86,0.98];         // 前景偏白（40%，已降）
      else if(cr<0.077)       col=[0.84,0.88,1.0];          // 白高光 8%
      else if(cr<0.30)       col=[0.40,0.36,0.62];         // 低饱和紫 22%
      else if(cr<0.36)       col=[0.34,0.50,0.50];         // 莫奈青绿 6%
      else if(cr<0.40)       col=[0.52,0.46,0.58];         // 莫奈薰衣草 4%
      else if(tier===0)      col=[0.12,0.18,0.40];         // 远景深蓝、略暗
      else                   col=[0.19,0.28,0.56];         // 中景夜幕蓝
      const b = tier===0 ? rand(0.45,0.72) : (tier===1?rand(0.6,0.88):rand(0.8,1.0));
      aColor[idx]=col[0]*b; aColor[idx+1]=col[1]*b; aColor[idx+2]=col[2]*b; }

    // ===== 0 深空（保留）=====
    if (Math.random()>0.85){
      const cr=15+Math.random()*10, th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1);
      pos0[idx]=cr*Math.sin(ph)*Math.cos(th)+20; pos0[idx+1]=cr*Math.sin(ph)*Math.sin(th)-10; pos0[idx+2]=cr*Math.cos(ph);
    } else { pos0[idx]=(Math.random()-0.5)*350; pos0[idx+1]=(Math.random()-0.5)*200; pos0[idx+2]=(Math.random()-0.5)*300; }

    // ===== 1 星系（势场密度盘：铺满 + 地貌起伏 + 虚实留白，无旋臂）=====
    {
      const roll=i%100;
      if (roll<8){ // 一条干净的光线穿过中心，向两端延伸
        const up=Math.random()<0.55;
        const yy = up ? Math.pow(Math.random(),0.7)*300 : -Math.pow(Math.random(),0.7)*270;
        const th=Math.random()*TAU, rr2=Math.abs(randn())*0.7;
        let lp=rot3([Math.cos(th)*rr2, yy, Math.sin(th)*rr2], 0.5, 0.26);
        pos1[idx]=lp[0]; pos1[idx+1]=lp[1]; pos1[idx+2]=lp[2];
        aDensity[i]=clamp(1.0 - Math.abs(yy)/300, 0.10, 1.0); // 末端渐淡
      } else if (roll<14){ // 中心亮核（圆球，孕育中、会流动，比之前小）
        const rr=Math.abs(randn())*6, th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1);
        let bp=rot3([rr*Math.sin(ph)*Math.cos(th), rr*Math.cos(ph)*0.65, rr*Math.sin(ph)*Math.sin(th)], 0.5, 0.26);
        pos1[idx]=bp[0]; pos1[idx+1]=bp[1]; pos1[idx+2]=bp[2];
        aDensity[i]=1.15;
      } else {
        // 铺满盘面（均匀面密度），再交给看不见的势场决定虚实
        const ang=Math.random()*TAU;
        let rr=Math.sqrt(Math.random())*86;
        let x=Math.cos(ang)*rr, z=Math.sin(ang)*rr;
        const dn=fieldDensity(x,z);
        // 沿势场轻微聚拢（破碎丝缕，低密处更松散=留白）
        x += Math.sin(x*0.21+z*0.15)*2.4*(1.0-dn);
        z += Math.cos(x*0.18-z*0.20)*2.4*(1.0-dn);
        // 地貌起伏：密处隆起更厚（发光山脉），疏处薄
        let y=randn()*(0.8 + dn*3.6) + Math.sin(rr*0.08 + ang*0.5)*1.6;
        let q=rot3([x,y,z], 0.5, 0.26);
        pos1[idx]=q[0]; pos1[idx+1]=q[1]; pos1[idx+2]=q[2];
        aDensity[i]=dn;
      }
    }

    // ===== 2 洛伦兹（回上一版：神秘感）=====
    {
      const p=lorenz[(Math.random()*Lz)|0];
      const SC=1.45, CZ=25;
      let q=rot3([ p[0]*SC+randn()*0.5, (p[2]-CZ)*SC+randn()*0.5, p[1]*SC+randn()*0.5 ], 0.30, -0.18);
      pos2[idx]=q[0]; pos2[idx+1]=q[1]; pos2[idx+2]=q[2];
      aSide[i]= p[0]>0 ? 1.0 : 0.0;
    }

    // ===== 3 星球 + 五层环 =====
    {
      let pp; aRingSpin[i]=0;
      if (i%100<52){ // 球体：实亮壳层为主，内部很虚空
        const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1);
        let rr;
        if (Math.random()<0.82){ rr=Rp*(0.975+Math.random()*0.035); }          // 实亮壳
        else { rr=Rp*Math.pow(Math.random(),0.5)*0.88; aSize[i]*=0.45; }        // 内部稀疏、虚
        pp=[ rr*Math.sin(ph)*Math.cos(th), rr*Math.cos(ph), rr*Math.sin(ph)*Math.sin(th) ];
        pp=rot3(pp, PLANET_TILT[0], PLANET_TILT[1]);
      } else { // 环：按 frac 分五层
        let pick=Math.random(), acc=0, L=rings[1];
        for(const ring of rings){ acc+=ring.frac; if(pick<=acc){ L=ring; break; } }
        let th=Math.random()*TAU;
        if (L.broken){ const seg=Math.floor(th/(TAU/7)); if (seg%2===0) th += TAU/7*0.6; }
        const rr=Rp*L.r + randn()*L.w;
        let p=[ Math.cos(th)*rr, randn()*L.th, Math.sin(th)*rr ];
        if (L.tilt) p=rot3(p, L.tilt, 0);
        pp=rot3(p, PLANET_TILT[0], PLANET_TILT[1]);
        aRingSpin[i]=L.spin;
        aSize[i]*=L.dim;
      }
      pos3[idx]=pp[0]; pos3[idx+1]=pp[1]; pos3[idx+2]=pp[2];
    }

    // ===== 4 莫比乌斯（保留原公式，记录环向参数 -> 月光沿 aU 行走）=====
    {
      const u3=(i/COUNT)*TAU, v3=(Math.random()-0.5)*8, R3=35;
      const x3=(R3+v3*Math.cos(u3/2))*Math.cos(u3), y3=(R3+v3*Math.cos(u3/2))*Math.sin(u3), z3=v3*Math.sin(u3/2);
      pos4[idx]=x3*0.707-z3*0.707; pos4[idx+1]=y3; pos4[idx+2]=x3*0.707+z3*0.707;
      aU[i]=u3;
    }

    // ===== 5 Aizawa 吸引子（记忆漩涡：球状涡管 + 中柱喷流，aFlow=局部流向）=====
    {
      const j=(Math.random()*(Az-10))|0;
      const p=aizawa[j], pn=aizawa[j+8];   // 轨迹上 8 步之后的点 -> 这一点的水流方向
      const SC=16.5, XS=1.10, CZ=0.55, YS=1.15;
      // 横向略微舒展，让左右两侧的涡管轨迹更容易被看见；上下喷流比例保持不变
      const cx=p[0]*SC*XS, cy=(p[2]-CZ)*SC*YS, cz=p[1]*SC;
      pos5[idx]=cx+randn()*0.15; pos5[idx+1]=cy+randn()*0.15; pos5[idx+2]=cz+randn()*0.15; // 管壁厚度（收紧，露出轨迹线条）
      aFlow[idx]  =pn[0]*SC*XS-cx;
      aFlow[idx+1]=(pn[2]-CZ)*SC*YS-cy;
      aFlow[idx+2]=pn[1]*SC-cz;
    }

    // ===== 6 穿越星场（球形，字幕背后是球形混沌，呼应第一幕）=====
    {
      const roll=i%100;
      if (roll<14){ // 近景小球，掠过镜头
        const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1), rr=rand(8,26);
        pos6[idx]=rr*Math.sin(ph)*Math.cos(th); pos6[idx+1]=rr*Math.sin(ph)*Math.sin(th); pos6[idx+2]=56+rr*Math.cos(ph);
      } else if (roll<42){ // 字幕背后的球形混沌
        const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1), rr=Math.pow(Math.random(),0.5)*32;
        pos6[idx]=rr*Math.sin(ph)*Math.cos(th); pos6[idx+1]=rr*Math.sin(ph)*Math.sin(th)*0.85; pos6[idx+2]=rr*Math.cos(ph)-4;
      } else { // 远景球壳深空
        const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1), rr=55+Math.pow(Math.random(),0.7)*135;
        pos6[idx]=rr*Math.sin(ph)*Math.cos(th); pos6[idx+1]=rr*Math.sin(ph)*Math.sin(th)*0.7-6; pos6[idx+2]=rr*Math.cos(ph);
      }
    }
  }

  g.setAttribute('position', new THREE.BufferAttribute(pos0,3));
  g.setAttribute('aTarget1', new THREE.BufferAttribute(pos1,3));
  g.setAttribute('aTarget2', new THREE.BufferAttribute(pos2,3));
  g.setAttribute('aTarget3', new THREE.BufferAttribute(pos3,3));
  g.setAttribute('aTarget4', new THREE.BufferAttribute(pos4,3));
  g.setAttribute('aTarget5', new THREE.BufferAttribute(pos5,3));
  g.setAttribute('aTarget6', new THREE.BufferAttribute(pos6,3));
  g.setAttribute('aSize', new THREE.BufferAttribute(aSize,1));
  g.setAttribute('aColor', new THREE.BufferAttribute(aColor,3));
  g.setAttribute('aSide', new THREE.BufferAttribute(aSide,1));
  g.setAttribute('aRingSpin', new THREE.BufferAttribute(aRingSpin,1));
  g.setAttribute('aDensity', new THREE.BufferAttribute(aDensity,1));
  g.setAttribute('aFlow', new THREE.BufferAttribute(aFlow,3));
  g.setAttribute('aU', new THREE.BufferAttribute(aU,1));

  const vert=`
    uniform float uTransition, uTime;
    uniform vec2 uMouse;
    uniform vec3 uPlanetAxis;
    attribute vec3 aTarget1,aTarget2,aTarget3,aTarget4,aTarget5,aTarget6;
    attribute float aSize, aSide, aRingSpin, aDensity, aU;
    attribute vec3 aColor, aFlow;
    varying vec3 vColor;
    varying float vAlpha, vGlow;

    vec3 rotAxis(vec3 p, vec3 ax, float a){
      ax=normalize(ax); float c=cos(a), s=sin(a);
      return p*c + cross(ax,p)*s + ax*dot(ax,p)*(1.0-c);
    }
    void main(){
      float u=uTransition;
      vec3 mp;
      if(u<=1.0)      mp=mix(position,aTarget1,smoothstep(0.0,1.0,u));
      else if(u<=2.0) mp=mix(aTarget1,aTarget2,smoothstep(1.0,2.0,u));
      else if(u<=3.0) mp=mix(aTarget2,aTarget3,smoothstep(2.0,3.0,u));
      else if(u<=4.0) mp=mix(aTarget3,aTarget4,smoothstep(3.0,4.0,u));
      else if(u<=5.0) mp=mix(aTarget4,aTarget5,smoothstep(4.0,5.0,u));
      else            mp=mix(aTarget5,aTarget6,smoothstep(5.0,6.0,u));

      // 统一的轻呼吸
      mp += sin(uTime*0.4 + mp.zxy*0.03)*0.45;

      // 星系阶段：中心团内部流动（孕育、活的，最活）
      float gg = 1.0-clamp(abs(u-1.0),0.0,1.0);
      if(gg>0.001){
        float core=1.0-smoothstep(3.0,20.0,length(mp));
        float ga=gg*core;
        if(ga>0.001){
          vec3 gn=normalize(mp+1e-4);
          vec3 g1=normalize(cross(gn,vec3(0.0,1.0,0.25)));
          vec3 g2=cross(gn,g1);
          mp += (g1*sin(uTime*0.6+mp.y*0.3+mp.x*0.15) + g2*cos(uTime*0.45+mp.z*0.25))*ga*2.2;
        }
      }

      vColor=aColor;
      // 冷暖渐变融入星尘：中心微蓝紫，外缘银白（细微，不抢色）
      float radc=length(mp);
      float cw=smoothstep(6.0,72.0,radc);
      vColor *= mix(vec3(0.74,0.76,0.96), vec3(0.97,0.99,1.05), cw);

      // —— 星球阶段：边界亮 + 内部多层水波 / 星环各自转 + 莫奈交融 ——
      float sg = smoothstep(2.5,3.0,u)*(1.0-smoothstep(3.0,3.55,u));
      float Rp=20.0;
      float dist=length(mp);
      if(sg>0.001){
        if(abs(aRingSpin)>0.0001){
          mp = rotAxis(mp, uPlanetAxis, uTime*aRingSpin*sg*6.0); // 五层各自转、反向
          // 星环莫奈交融：按半径渐变 + 暖色流动（像洛伦兹那样在交融）
          float rt=clamp((dist/Rp-1.3)/1.5,0.0,1.0);
          float rflow=0.5+0.5*sin(uTime*0.4 + dist*0.3);
          vec3 mc=mix(vec3(0.36,0.52,0.52), vec3(0.55,0.48,0.64), rt);  // 青绿->薰衣草
          mc=mix(mc, vec3(0.82,0.66,0.50), rflow*0.45);                 // 暖金交融
          vColor=mix(vColor, mc, sg*0.72);
        } else {
          // 内部多层水波：切向流动 + 径向多层在边界碰撞回弹
          vec3 n=normalize(mp+1e-4);
          vec3 t1=normalize(cross(n, vec3(0.0,1.0,0.2)));
          vec3 t2=cross(n,t1);
          float depth=clamp(dist/Rp,0.0,1.2);
          float interior=1.0-smoothstep(0.72,0.99,depth);
          float w1=sin(uTime*0.5 + mp.y*0.25 + mp.x*0.10);
          float w2=cos(uTime*0.37 + mp.z*0.22 - mp.y*0.12);
          float w3=sin(uTime*0.62 + dist*0.7);            // 多层水纹
          float w4=sin(uTime*0.40 - dist*1.1);            // 反向层 -> 碰撞
          float amp=interior*sg*2.8;
          mp += (t1*w1 + t2*w2)*amp + n*(w3+w4*0.6)*amp*0.5;
        }
        float shell=smoothstep(0.80,0.99,dist/Rp)*(1.0-smoothstep(1.03,1.18,dist/Rp));
        vColor += vec3(0.42,0.54,0.78)*shell*sg;
      }

      // —— 洛伦兹阶段：金白 / 蓝白，双翼相位相反，互相流动 ——
      float lz=1.0-clamp(abs(u-2.0),0.0,1.0);
      if(lz>0.001){
        float flow=0.5+0.5*sin(uTime*0.55 + mp.x*0.13 + mp.y*0.09);
        vec3 gold=vec3(1.0,0.82,0.45);
        vec3 blue=vec3(0.55,0.74,1.0);
        float mm=mix(1.0-flow, flow, aSide);
        vColor=mix(vColor,mix(blue,gold,mm),lz*0.92);
      }

      // —— 莫比乌斯阶段：一束月光沿环面行走，单面无尽 ——
      float mb=1.0-clamp(abs(u-4.0),0.0,1.0);
      float beam=0.0;
      if(mb>0.001){
        float lpos=uTime*0.34;                                  // 月光行进
        float da=abs(mod(aU-lpos+3.14159265,6.2831853)-3.14159265); // 环向距离
        beam=smoothstep(0.85,0.0,da); beam*=beam*mb;
        vColor=mix(vColor, vec3(0.86,0.90,1.08), beam*0.8);     // 冷银月色
        vColor += vec3(0.28,0.32,0.48)*beam;                    // 余晖
      }

      // —— Aizawa 阶段：粒子沿吸引子流线呼吸行进 + 涡核青辉（活的记忆漩涡）——
      float az5=1.0-clamp(abs(u-5.0),0.0,1.0);
      if(az5>0.001){
        float ph5=dot(mp,vec3(0.31,0.27,0.23));                 // 相位按位置错开 -> 水流不齐步
        float adv=0.5+0.5*sin(uTime*0.9+ph5);
        mp += aFlow*adv*az5*0.7;                                // 沿各自流线轻微滑行（减小振幅，露出线条）
        float rr5=length(mp.xz);
        float core5=1.0-smoothstep(2.0,10.0,rr5);               // 中柱喷流
        vColor += vec3(0.16,0.32,0.32)*core5*az5*(0.5+0.5*sin(uTime*0.7+mp.y*0.35));
        vColor *= 1.0+0.16*az5*sin(uTime*1.1+ph5*1.3);          // 整体明暗在呼吸
        // 只提亮球体左右腰线，不碰上下两端；让侧面的流线从暗部里浮出来
        float side5=smoothstep(7.5,16.5,abs(mp.x))*(1.0-smoothstep(11.0,23.0,abs(mp.y)));
        vColor += vec3(0.24,0.31,0.48)*side5*az5*0.72;
      }

      // —— 黑一拍：终幕浮现之前，宇宙先安静半秒 ——
      float dip=smoothstep(5.18,5.42,u)*(1.0-smoothstep(5.42,5.68,u));
      vColor*=1.0-dip*0.72;

      vec4 mv=modelViewMatrix*vec4(mp,1.0);
      // 鼠标：微型引力，切向绕流 -> 轨迹有惯性曲线（近似物理，无光效）
      vec2 ss=mv.xy/mv.w;
      vec2 toM=ss-uMouse*15.0;
      float d=length(toM);
      if(d<10.0){
        float f=(1.0-smoothstep(0.0,10.0,d)); f*=f;
        vec2 dir=normalize(toM+1e-4);
        vec2 tang=vec2(-dir.y,dir.x);                       // 切向 -> 绕流而非直推
        mv.xy += (tang*1.9 + dir*0.55)*f*(1.1+0.4*sin(uTime*0.8+d*0.6));
      }

      gl_Position=projectionMatrix*mv;
      // 星系阶段：势场密度决定虚实——高密实亮、低密缩小成留白
      float gw=1.0-clamp(abs(u-1.0),0.0,1.0);
      float sizeMul=mix(1.0, mix(0.12,1.9,aDensity), gw);
      // Aizawa 阶段：涡管丝线更实；月光经过的粒子微微涨大
      sizeMul*=mix(1.0,1.35,az5);
      float azSideSize=smoothstep(7.5,16.5,abs(mp.x))*(1.0-smoothstep(11.0,23.0,abs(mp.y)));
      sizeMul*=1.0+azSideSize*az5*0.34;
      sizeMul*=1.0+beam*0.9;
      vColor += vec3(0.30,0.38,0.55)*smoothstep(0.72,1.12,aDensity)*gw; // 高密发光边界
      gl_PointSize=aSize*sizeMul*(160.0/-mv.z);
      vGlow=clamp((gl_PointSize-3.0)/13.0,0.0,1.0); // 近景=亮芯
      // 慢闪：远景小星低频渐隐渐现（像恒星，不是高频噪点），近景不闪
      float tw=0.80+0.20*sin(uTime*0.7 + dot(mp, vec3(0.6,0.42,0.5)));
      vColor *= mix(tw, 1.0, vGlow);
      vAlpha=smoothstep(-900.0,-10.0,mv.z);
    }
  `;
  const frag=`
    uniform float uOpacity;
    varying vec3 vColor;
    varying float vAlpha, vGlow;
    void main(){
      vec2 cxy=gl_PointCoord*2.0-1.0;
      float r=dot(cxy,cxy);
      if(r>1.0) discard;
      float soft=pow(1.0-r,3.5);            // 远景柔糊
      float hot =pow(1.0-r,9.0);            // 近景锐亮芯
      float halo=pow(1.0-r,1.5)*0.10;       // 极淡宽晕（关掉才察觉的辉光）
      vec3 col=vColor + vec3(0.55,0.66,0.9)*hot*vGlow;
      float a=mix(soft, max(soft,hot), vGlow) + halo;
      gl_FragColor=vec4(col, a*vAlpha*0.9*uOpacity);
    }
  `;
  const mat=new THREE.ShaderMaterial({
    vertexShader:vert, fragmentShader:frag,
    uniforms:{ uTransition:{value:0}, uTime:{value:0}, uMouse:{value:new THREE.Vector2(0,0)},
               uOpacity:{value:1.0},
               uPlanetAxis:{value:new THREE.Vector3(PLANET_AXIS[0],PLANET_AXIS[1],PLANET_AXIS[2])} },
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  particleSystem=new THREE.Points(g,mat);
  scene.add(particleSystem);
}

function onMouseMove(e){
  targetMouse.x=(e.clientX/width)*2-1; targetMouse.y=-(e.clientY/height)*2+1;
}
function onWindowResize(){ width=innerWidth; height=innerHeight; camera.aspect=width/height; camera.updateProjectionMatrix(); renderer.setSize(width,height); }

function onOpeningClick(e){
  if(openingFinished) return;
  if(e.target.closest('#music,#skip-opening,#logo,.planet-label')) return;
  if(!catPlanetGroup || !Array.isArray(PLANETS)) return;
  let best = null;
  PLANETS.forEach(P => {
    if(!P._screen || !P._screen.visible || !P.tab) return;
    const d = Math.hypot(e.clientX - P._screen.x, e.clientY - P._screen.y);
    if(d < 38 && (!best || d < best.d)) best = { tab: P.tab, d };
  });
  if(best) finishOpening(best.tab);
}

function finishOpening(tab=''){
  if(openingFinished) return;
  openingFinished = true;
  if(openingExitTimer){
    clearTimeout(openingExitTimer);
    openingExitTimer = null;
  }
  try {
    window.parent.postMessage({ type:'nocturne-opening-finish', tab }, '*');
  } catch(e) {}
  setTimeout(cleanupOpening, 80);
}

function disposeMaterial(mat){
  if(!mat) return;
  if(Array.isArray(mat)){ mat.forEach(disposeMaterial); return; }
  if(mat.map) mat.map.dispose();
  mat.dispose?.();
}

function cleanupOpening(){
  if(openingFrameId) cancelAnimationFrame(openingFrameId);
  window.removeEventListener('resize', onWindowResize);
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('click', onOpeningClick);
  if(Array.isArray(PLANETS)){
    PLANETS.forEach(P => {
      if(P._label) P._label.remove();
    });
  }
  if(scene){
    scene.traverse(obj => {
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material) disposeMaterial(obj.material);
    });
  }
  if(renderer){
    renderer.dispose();
    renderer.forceContextLoss?.();
    renderer.domElement?.remove();
  }
}

// 背景星：分远/中两层，始终在，让任何形态都不在纯黑里变换
let dustSys, heroSys;
function createBackgroundStars(){
  const n=4200, g=new THREE.BufferGeometry();
  const pos=new Float32Array(n*3), col=new Float32Array(n*3), warmCol=new Float32Array(n*3), sz=new Float32Array(n);
  const cs=[ new THREE.Color(0x8a93b8), new THREE.Color(0x4a5378), new THREE.Color(0xb9c2e0) ];
  const warmCs=[ new THREE.Color(0xefe0c4), new THREE.Color(0xc6aa87), new THREE.Color(0x6f4931), new THREE.Color(0x8b7d90) ];
  const signalOrange=new THREE.Color(0xe8954f);
  for(let i=0;i<n;i++){
    const far = i%3===0;                                  // 1/3 远景更小更暗
    const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1);
    const r = far ? 460+Math.random()*420 : 200+Math.random()*220;
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    const c=cs[(Math.random()*cs.length)|0], b=(far?0.22:0.45)+Math.random()*0.4;
    col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
    const wc=Math.random()<0.08 ? signalOrange : warmCs[(Math.random()*warmCs.length)|0];
    warmCol[i*3]=wc.r*b; warmCol[i*3+1]=wc.g*b; warmCol[i*3+2]=wc.b*b;
    sz[i]= far ? 0.8 : 1.7;
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  g.setAttribute('size', new THREE.BufferAttribute(sz,1));
  const mat=new THREE.PointsMaterial({ size:1.4, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.55, depthWrite:false, blending:THREE.AdditiveBlending, fog:true });
  bgStars=new THREE.Points(g,mat);
  bgStars.userData.coolColors=col.slice();
  bgStars.userData.warmColors=warmCol;
  scene.add(bgStars);
}

function _setCatroomPalette(active){

// 体积尘雾：极淡的大柔焦粒子，弥漫出"空气感"

// 前景英雄粒子：少量、巨大、失焦，镜头移动时缓慢从边缘掠过
function createHeroParticles(){
  const n=42, g=new THREE.BufferGeometry();
  const pos=new Float32Array(n*3), col=new Float32Array(n*3), sz=new Float32Array(n);
  const cs=[ new THREE.Color(0xc6d0ef), new THREE.Color(0x9aa6d6), new THREE.Color(0xe6dcc4) ];
  for(let i=0;i<n;i++){
    const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1), r=40+Math.random()*60;
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    const c=cs[(Math.random()*cs.length)|0], b=0.5+Math.random()*0.5;
    col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
    sz[i]= 26+Math.random()*40;
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  g.setAttribute('size', new THREE.BufferAttribute(sz,1));
  // 自定义：按 attribute size 的失焦柔点
  const mat=new THREE.ShaderMaterial({
    uniforms:{ uTex:{value:softSprite()}, uOpacity:{value:1.0} },
    vertexShader:`attribute float size; attribute vec3 color; varying vec3 vC;
      void main(){ vC=color; vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(300.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`uniform sampler2D uTex; uniform float uOpacity; varying vec3 vC;
      void main(){ float a=texture2D(uTex, gl_PointCoord).a; gl_FragColor=vec4(vC, a*0.14*uOpacity); }`,
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  heroSys=new THREE.Points(g,mat);
  heroSys.frustumCulled=false;
  scene.add(heroSys);
}

// 生成一张柔边圆形贴图（失焦/尘雾用）
let _sprite=null;
function softSprite(){
  if(_sprite) return _sprite;
  const c=document.createElement('canvas'); c.width=c.height=64;
  const x=c.getContext('2d'); const g=x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.4,'rgba(255,255,255,0.35)'); g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,64,64);
  _sprite=new THREE.CanvasTexture(c); return _sprite;
}

// 生成一张边缘只虚化一点的圆形贴图（星球本体的实心感）
let _hardSprite=null;
function hardSprite(){
  if(_hardSprite) return _hardSprite;
  const c=document.createElement('canvas'); c.width=c.height=128;
  const x=c.getContext('2d'); const g=x.createRadialGradient(64,64,0,64,64,64);
  // 中心实满 → 0.62处仍95% → 0.78小幅羽化 → 1.0完全透明
  g.addColorStop(0.00,'rgba(255,255,255,1.00)');
  g.addColorStop(0.62,'rgba(255,255,255,0.95)');
  g.addColorStop(0.78,'rgba(255,255,255,0.55)');
  g.addColorStop(1.00,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  _hardSprite=new THREE.CanvasTexture(c); return _hardSprite;
}

const clock=new THREE.Clock();
const _cam=new THREE.Vector3(), _look=new THREE.Vector3();
let lastT=0, rotY=0, rotZ=0, windPhase=0;
// 各阶段的注视锚（偏离画面中心，跟随显著粒子簇）
const ANCH=[
  [18,-10,-4], // 深空混沌团（右下）
  [20,5,-14],  // 星系偏心密度脊
  [12,2,2],    // 洛伦兹一翼
  [0,6,0],     // 星球
  [-16,5,3],   // 莫比乌斯一侧
  [3,4,0],     // Aizawa 涡核偏上
  [0,0,0],     // Nocturne
];

function animate(){
  if(openingFinished) return;
  openingFrameId = requestAnimationFrame(animate);
  const T=clock.getElapsedTime();
  const dt=Math.min(T-lastT,0.05); lastT=T;
  smoothedProgress += (currentProgress-smoothedProgress)*0.045;
  const p=smoothedProgress;
  const m=particleSystem.material.uniforms;
  m.uTransition.value=p; m.uTime.value=T;
  mouse.x+=(targetMouse.x-mouse.x)*0.05; mouse.y+=(targetMouse.y-mouse.y)*0.05;
  m.uMouse.value.copy(mouse);

  // Nocturne 浮现：阈值切 class，CSS 接管"对焦"——blur 散去 + 字距收拢
  const wm=document.getElementById('wordmark');
  // wordmark fully JS driven
  if(p<=6.1){
    const wmT=Math.max(0,Math.min(1,(p-5.3)/0.7));  // 5.3→6.0 fade in
    wm.style.opacity=wmT.toFixed(3);
    wm.style.filter='blur('+(14*(1-wmT)).toFixed(1)+'px)';
    const titleEl=wm.querySelector('.title');
    if(titleEl){
      const ls=(0.62-0.28*wmT).toFixed(3);
      titleEl.style.letterSpacing=ls+'em';
      titleEl.style.textIndent=ls+'em';
    }
  }

  // 左下旁白：每变换一幕换一句（渐隐渐现 + 微模糊）
  if(p<=6.1)updateSubtitle(p);

  // —— 风的运镜：不绕圈，随密度/能量漂流，稀疏快、密集慢，注视跟随簇 ——
  const transit = Math.abs(Math.sin(p*Math.PI));           // 半整数=过渡稀疏(快)，整数=成形(慢)
  windPhase += dt*(0.05 + transit*0.20);
  const baseDist = 92 - p*3;
  const az = p*1.25 + Math.sin(windPhase*0.37)*0.9 + Math.sin(windPhase*0.13+2.0)*0.6;
  let el = 1.15 + Math.sin(windPhase*0.45+1.0)*0.45 + Math.cos(windPhase*0.19)*0.3;
  el = clamp(el, 0.40, Math.PI-0.40);
  const dist = baseDist*(0.92 + 0.20*Math.sin(windPhase*0.23+0.5));
  _cam.set(dist*Math.sin(el)*Math.cos(az), dist*Math.cos(el)+Math.sin(windPhase*0.3)*4, dist*Math.sin(el)*Math.sin(az));
  const i0=Math.min(Math.floor(p),6), i1=Math.min(i0+1,6), f=p-i0;
  _look.set(
    ANCH[i0][0]+(ANCH[i1][0]-ANCH[i0][0])*f + Math.sin(windPhase*0.40)*2.5,
    ANCH[i0][1]+(ANCH[i1][1]-ANCH[i0][1])*f + Math.cos(windPhase*0.33)*2.0,
    ANCH[i0][2]+(ANCH[i1][2]-ANCH[i0][2])*f + Math.sin(windPhase*0.27)*2.5
  );

  if(p<6.5){
  const settle=smooth(5.3,6.0,p);
  if(settle>0){ _cam.lerp(new THREE.Vector3(0,4,74),settle); _look.lerp(new THREE.Vector3(0,0,0),settle); }
  camera.position.lerp(_cam, 0.04);   // 强惯性缓动 = 风的进退
  camera.lookAt(_look);

  // 宏观自转：文字归零（累积式，变速不跳）
  const spin=1.0-settle;
  rotY+=dt*0.008*spin; rotZ+=dt*0.003*spin;
  particleSystem.rotation.y=rotY;
  particleSystem.rotation.z=rotZ;
  if(bgStars) bgStars.rotation.y = T*0.003;
  }
  if(dustSys){ dustSys.rotation.y = T*0.004; const ex=1.0+0.05*Math.sin(T*0.035); dustSys.scale.setScalar(ex); }
  if(heroSys){ heroSys.rotation.y = T*0.012; heroSys.rotation.x = Math.sin(T*0.05)*0.1; }


  // ── CAT PHASE (p 6→9 分四段) ──
  // 子阶段划分：
  //   6.0~6.3   停留（字幕保持，什么都不动）
  //   6.3~6.7   字幕+14粒子+光晕缓慢淡出
  //   6.7~7.15  全黑停留（让镜头真正归零）
  //   7.15~9.0  猫粒子从远处飞入，光晕跟着渐显，文案 Here, a small gravity. 浮现

  const catP = Math.max(0, p - 6.0);

  if(catP > 0){
    if(!catReady) _initCatPhase();

    // ─── 子阶段参数 ───
    const holdEnd   = 0.3;    // 停留结束
    const fadeEnd   = 0.7;    // 渐出结束（提前，让淡出更紧凑）
    const blackEnd  = 1.15;   // 黑场结束（延长黑场停留，让镜头归零）
    document.body.classList.toggle('catroom-phase', catP > blackEnd);
    _setCatroomPalette(catP > blackEnd);
    // catP>blackEnd 时猫飞入，progress 7.15~9.0 → flyP 0~1.85

    // 14粒子：6.3~6.7 渐出
    const alpha14 = catP < holdEnd ? 1.0
                  : catP < fadeEnd ? 1.0 - (catP - holdEnd)/(fadeEnd - holdEnd)
                  : 0.0;
    particleSystem.visible = alpha14 > 0.005;
    if(particleSystem.material.uniforms){
      particleSystem.material.uniforms.uTransition.value = Math.min(6.0, p);
      particleSystem.material.uniforms.uOpacity.value = alpha14;
    }

    // bgStars：fade阶段完全归零，黑场全黑，飞入时缓缓回升——猫不孤单地浮在星海里
    const flyP0 = Math.max(0, catP - blackEnd);
    const scenicRise = Math.min(1, flyP0/0.7);       // 光晕的渐显进度（0~1）
    const bgAlpha = catP < holdEnd  ? 1.0
                  : catP < fadeEnd  ? 1.0 - (catP - holdEnd)/(fadeEnd - holdEnd)
                  : catP < blackEnd ? 0.0
                  : scenicRise * 0.61;               // 升回到接近原来的水平
    if(bgStars) bgStars.material.opacity = bgAlpha * 0.55;

    // dust + hero 光晕：跟bgStars同步淡出→全黑→渐显，避免黑场里残留底光
    const dustHeroAlpha = catP < holdEnd  ? 1.0
                        : catP < fadeEnd  ? 1.0 - (catP - holdEnd)/(fadeEnd - holdEnd)
                        : catP < blackEnd ? 0.0
                        : scenicRise;
    if(dustSys) dustSys.material.opacity = 0.009 * dustHeroAlpha;
    if(heroSys && heroSys.material.uniforms && heroSys.material.uniforms.uOpacity){
      heroSys.material.uniforms.uOpacity.value = dustHeroAlpha;
    }

    // 猫场景前中景粒子：等粒子开始成形再缓缓浮现，跟着飞入继续推到满
    if(catScenicSys){
      const flyP = Math.max(0, catP - blackEnd);
      const sc = clamp((flyP - 0.3) / 1.0, 0, 1);
      const eased = sc*sc*(3.0-2.0*sc);
      catScenicSys.material.uniforms.uOpacity.value = eased;
      catScenicSys.material.uniforms.uTime.value = T;
      catScenicSys.visible = eased > 0.005;
      catScenicSys.rotation.y = Math.sin(T*0.045)*0.035;
    }

    // 字幕（Nocturne wordmark）：和14粒子同步淡出
    const wm = document.getElementById('wordmark');
    wm.style.opacity = alpha14.toFixed(3);
    if(alpha14 > 0.005){
      // filter跟着透明度走，模糊在消失过程中逐渐加深（往虚里消）
      const blurVal = (1.0 - alpha14) * 20;
      wm.style.filter = 'blur(' + blurVal.toFixed(1) + 'px)';
    } else {
      wm.style.filter = 'blur(20px)';
    }
    // 14的subtitle同步淡出
    const se14 = document.getElementById('subtitle');
    if(catP < fadeEnd && se14) se14.style.opacity = alpha14.toFixed(3);

    // ─── 猫粒子飞入（catP > blackEnd，即p > 7.0）───
    const flyP = Math.max(0, catP - blackEnd); // 0 → 2.0
    if(catParticleSystem){
      catParticleSystem.visible = flyP > 0;
      if(flyP > 0){
        catParticleSystem.material.uniforms.uTransition.value = flyP;
        catParticleSystem.material.uniforms.uTime.value = T;
        catParticleSystem.material.uniforms.uMouse.value.copy(mouse);
        catParticleSystem.rotation.y = Math.sin(T*.05)*.08 + T*.045;
        // 0~0.15 内淡入，避免4万粒子瞬间刷出
        const fadeIn = clamp(flyP/0.15, 0, 1);
        catParticleSystem.material.uniforms.uOpacity.value = fadeIn*fadeIn*(3.0-2.0*fadeIn);
      }
    }

    // 行星等猫的轮廓基本聚出后再出现，不抢成形过程
    if(flyP > 1.22 && !catPlanetsCreated){ _createCatPlanets(); catPlanetsCreated = true; }
    if(catPlanetGroup){
      catPlanetGroup.visible = flyP > 1.22;
      if(flyP > 1.22) _updateCatPlanets(T, clamp((flyP - 1.22)/0.55, 0, 1));
    }

    // logo：猫飞入后浮现
    const lo = document.getElementById('logo');
    if(lo) lo.style.opacity = Math.min(1, Math.max(0, flyP - 0.2) * 2).toFixed(3);

    // 猫phase字幕：黑场结束、猫粒子开始飞入时再慢慢浮现，保留到结束
    if(catP > blackEnd){
      const se = document.getElementById('subtitle');
      const FINAL_LINE = "Here, a small gravity.";
      if(se.textContent !== FINAL_LINE) se.textContent = FINAL_LINE;
      const fadeT = clamp((catP - blackEnd) / 0.5, 0, 1);
      const eased = fadeT*fadeT*(3.0-2.0*fadeT);
      se.style.opacity = eased.toFixed(3);
      const ce = document.getElementById('code');
      if(ce){ ce.textContent = 'VI · I · VII · IV'; ce.classList.add('show'); }
    }

    // ─── 相机 ───
    if(catP > blackEnd){
      // 猫相机：俯视推近
      windPhase += dt * 0.12;
      const cd = flyP < 1 ? 96 - flyP*46 : 50 + clamp(flyP-1,0,1)*32;
      const cy = flyP < 1 ? 15 - flyP*3  : 12 + clamp(flyP-1,0,1)*4;
      const cdw = cd + Math.sin(windPhase*.5)*3.5;
      const az = Math.sin(windPhase*.18)*.45 + Math.cos(windPhase*.31)*.28;
      const el = 0.42 + Math.sin(windPhase*.27)*.13;
      _cam.set(cdw*Math.cos(el)*Math.sin(az), cdw*Math.sin(el)+cy*.3, cdw*Math.cos(el)*Math.cos(az));
      _look.set(Math.sin(windPhase*.4)*1.6, 1.5+Math.cos(windPhase*.33)*1.2, Math.sin(windPhase*.27)*1.6);
      camera.position.lerp(_cam, .04);
      camera.lookAt(_look);
    }
    // 停留+渐出段：相机保持14结尾的位置（settle到(0,4,74)），不动

  } else {
    // p <= 6：还原所有cat状态
    document.body.classList.remove('catroom-phase');
    _setCatroomPalette(false);
    if(catParticleSystem){ catParticleSystem.visible = false; catParticleSystem.material.uniforms.uOpacity.value = 0; }
    if(catPlanetGroup)    catPlanetGroup.visible    = false;
    if(catScenicSys){ catScenicSys.visible = false; catScenicSys.material.uniforms.uOpacity.value = 0; }
    particleSystem.visible = true;
    particleSystem.material.uniforms.uOpacity.value = 1.0;
    if(bgStars){ bgStars.visible = true; bgStars.material.opacity = 0.55; }
    if(dustSys) dustSys.material.opacity = 0.009;
    if(heroSys && heroSys.material.uniforms && heroSys.material.uniforms.uOpacity){
      heroSys.material.uniforms.uOpacity.value = 1.0;
    }
    const logoEl = document.getElementById('logo');
    if(logoEl) logoEl.style.opacity = '0';
  }
  renderer.render(scene,camera);
}

function orbitPosition(P, t){
  const b = P.a * Math.sqrt(1 - P.ecc*P.ecc);
  let x = P.a * Math.cos(t);
  let y = 0;
  let z = b * Math.sin(t);
  // 先绕 x 轴倾斜（tiltX）
  const cx = Math.cos(P.tiltX), sx = Math.sin(P.tiltX);
  const y1 = y*cx - z*sx;
  const z1 = y*sx + z*cx;
  // 再绕 z 轴倾斜（tiltZ）
  const cz = Math.cos(P.tiltZ), sz = Math.sin(P.tiltZ);
  const x2 = x*cz - y1*sz;
  const y2 = x*sz + y1*cz;
  return [x2, y2, z1];
}

function decodeCatCloud(){
  const b64 = document.getElementById('cat-data').textContent.trim();
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  const dv = new DataView(bytes.buffer);
  // per point: int16 x3 (6 bytes) + uint8 layer + uint8 region + uint8 density = 9 bytes
  const STRIDE = 9;
  const QUANT = 1000.0;
  const target = new Float32Array(COUNT*3);
  const region = new Float32Array(COUNT);
  const density = new Float32Array(COUNT);
  const layer = new Float32Array(COUNT);
  for(let i=0;i<COUNT;i++){
    const off = i*STRIDE;
    // 反转 y 和 z（绕 x 轴 180°），让猫头朝相机、姿态正立
    target[i*3]   =  dv.getInt16(off,   true)/QUANT;
    target[i*3+1] = -dv.getInt16(off+2, true)/QUANT;
    target[i*3+2] = -dv.getInt16(off+4, true)/QUANT;
    layer[i]   = dv.getUint8(off+6);          // 0=surface, 1=interior
    region[i]  = dv.getUint8(off+7)/255.0;    // 0~1
    density[i] = dv.getUint8(off+8)/255.0;    // 0~1
  }
  return { target, region, density, layer };
}

function _createCatPS(cat){
  const g = new THREE.BufferGeometry();

  // chaos = initial scattered cloud (球形混沌，类似开屏的"穿越星场")
  const chaos = new Float32Array(COUNT*3);
  const aSize = new Float32Array(COUNT);
  const aColor = new Float32Array(COUNT*3);
  const aArrival = new Float32Array(COUNT);   // 每粒子到达时间偏移
  const aSpiral = new Float32Array(COUNT);    // 螺旋偏移强度

  for(let i=0;i<COUNT;i++){
    // 初始位置：从极远处朝镜头飞来（流星雨感）
    const th = Math.random()*TAU;
    const ph = Math.acos(Math.random()*2-1);
    // 大部分极远，少数中距离，错出层次感
    const rBand = Math.random();
    const r = rBand < 0.15 ? rand(80,160)      // 少数先到的近程弹
            : rBand < 0.55 ? rand(160,280)     // 主体中程
            : rand(280,520);                   // 远程压轴
    chaos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    chaos[i*3+1] = r*Math.sin(ph)*Math.sin(th)*0.6;  // 稍压扁，像从天幕撒下
    chaos[i*3+2] = r*Math.cos(ph);

    // ===== 尺寸分层（沿用开屏比例）=====
    let tier;
    const rr = Math.random();
    if(rr<0.68){ aSize[i]=rand(1.0,1.9); tier=0; }
    else if(rr<0.94){ aSize[i]=rand(1.9,3.1); tier=1; }
    else if(rr<0.9987){ aSize[i]=rand(3.1,4.6); tier=2; }
    else { aSize[i]=rand(4.6,6.4); tier=2; }

    // ===== 配色（沿用开屏调色板）=====
    const cr = Math.random();
    let col;
    if(tier>=2 && cr<0.40) col=[0.82,0.86,0.98];
    else if(cr<0.077)      col=[0.84,0.88,1.0];
    else if(cr<0.30)       col=[0.40,0.36,0.62];
    else if(cr<0.36)       col=[0.34,0.50,0.50];
    else if(cr<0.40)       col=[0.52,0.46,0.58];
    else if(tier===0)      col=[0.12,0.18,0.40];
    else                   col=[0.19,0.28,0.56];
    // 独立抽取 10% 橙色，避免改变剩余 90% 的原始宇宙配色分布。
    if(Math.random()<0.10) col=[0.91,0.58,0.31];
    const b = tier===0 ? rand(0.45,0.72) : (tier===1?rand(0.6,0.88):rand(0.8,1.0));
    aColor[i*3]=col[0]*b; aColor[i*3+1]=col[1]*b; aColor[i*3+2]=col[2]*b;

    // ===== 到达时间错峰：让粒子不是同步到达 =====
    // arrival与距离挂钩：近程早到，远程晚到，自然流动感
    aArrival[i] = rBand < 0.15 ? rand(0.0, 0.35)
                : rBand < 0.55 ? rand(0.2, 0.72)
                : rand(0.5, 1.0);
    aSpiral[i]  = rand(0.7, 1.3);          // 螺旋振幅个体差异
  }

  g.setAttribute('position', new THREE.BufferAttribute(chaos, 3));
  g.setAttribute('aTarget',  new THREE.BufferAttribute(cat.target, 3));
  g.setAttribute('aSize',    new THREE.BufferAttribute(aSize, 1));
  g.setAttribute('aColor',   new THREE.BufferAttribute(aColor, 3));
  g.setAttribute('aRegion',  new THREE.BufferAttribute(cat.region, 1));
  g.setAttribute('aDensity', new THREE.BufferAttribute(cat.density, 1));
  g.setAttribute('aLayer',   new THREE.BufferAttribute(cat.layer, 1));
  g.setAttribute('aArrival', new THREE.BufferAttribute(aArrival, 1));
  g.setAttribute('aSpiral',  new THREE.BufferAttribute(aSpiral, 1));

  const vert=`
    uniform float uTransition;   // 0=chaos, 1=cat formed (clamped 0~2 outside)
    uniform float uTime;
    uniform vec2  uMouse;
    attribute vec3 aTarget, aColor;
    attribute float aSize, aRegion, aDensity, aLayer, aArrival, aSpiral;
    varying vec3 vColor;
    varying float vAlpha, vGlow;

    void main(){
      float u = clamp(uTransition, 0.0, 2.0);

      // === 龙卷风式成形：先卷入漏斗旋臂，再沿弧线收束到猫的轮廓 ===
      float t = clamp((u - aArrival*0.50) / 1.08, 0.0, 1.0);
      float enter = smoothstep(0.0,0.36,t);
      float settle = smoothstep(0.34,1.0,t);
      settle = settle*settle*(3.0-2.0*settle);

      vec3 chaos = position;
      vec3 cat = aTarget;

      // 漏斗上宽下窄；每颗粒子相位不同，形成数条松散旋臂而非整齐圆环
      float heightN = clamp((cat.y+9.0)/25.0,0.0,1.0);
      float funnelR = mix(5.5,25.0,heightN)*(0.82+0.34*aSpiral);
      float angle = aArrival*31.0 + t*(13.0+5.0*aSpiral) + uTime*0.34;
      float collapse = 1.0-smoothstep(0.42,0.98,t);
      float radius = mix(length(cat.xz)+1.5,funnelR,collapse);
      vec3 vortex = vec3(
        cos(angle)*radius,
        mix(chaos.y*0.12,cat.y,enter)+sin(angle*0.55+aArrival*17.0)*3.2*collapse,
        sin(angle)*radius
      );

      // 先从深空卷入漏斗，再让旋臂逐渐贴合真实猫轮廓
      vec3 mp = mix(chaos,vortex,enter);
      mp = mix(mp,cat,settle);

      // 临近轮廓仍保留一小段切向惯性，尾音自然消失
      vec3 radial = normalize(vec3(vortex.x,0.0,vortex.z)+vec3(1e-5));
      vec3 tangent = vec3(-radial.z,0.0,radial.x);
      float arcTail = sin(t*3.14159)*(1.0-settle);
      mp += tangent*arcTail*(3.2+3.0*aSpiral);
      mp.y += sin(angle*1.35)*arcTail*1.4;

      // === 猫成形后的"活"：呼吸、星尘、尾流转、内部迁移 ===
      float catness = smoothstep(0.72, 0.98, t);  // 每颗粒子按自己的到达进度开始“活”
      float melt = 0.0;                            // 底部融化量(传给透明度)
      if (catness > 0.001) {
        // 呼吸（整体微缩放）— 主要在头/耳和身体
        float breath = sin(uTime * 0.6) * 0.5 + 0.5;
        // breath 信号集中在 region≈1.0（头/耳） 和 region≈0.25（身体轮廓）
        float headness = 1.0 - abs(aRegion - 1.0) * 4.0; headness = clamp(headness, 0.0, 1.0);
        float bodyness = 1.0 - abs(aRegion - 0.25) * 4.0; bodyness = clamp(bodyness, 0.0, 1.0);
        vec3 fromCenter = normalize(cat + vec3(1e-4));
        mp += fromCenter * breath * (headness * 0.35 + bodyness * 0.18) * catness;

        // 背部星尘漂移（region≈0.5）：沿 +y 方向缓慢漂浮，叠加水平波动
        float backness = 1.0 - abs(aRegion - 0.5) * 4.0; backness = clamp(backness, 0.0, 1.0);
        mp.y += sin(uTime*0.3 + cat.x*0.4 + cat.z*0.3) * 0.6 * backness * catness;
        mp.x += cos(uTime*0.22 + cat.z*0.5) * 0.35 * backness * catness;

        // 尾部流转（region≈0.75）：绕 y 轴切向缓慢流动
        float tailness = 1.0 - abs(aRegion - 0.75) * 4.0; tailness = clamp(tailness, 0.0, 1.0);
        float tang_t = sin(uTime*0.35 + cat.x*0.3 + cat.z*0.4);
        mp.x += -cat.z * 0.04 * tang_t * tailness * catness;
        mp.z +=  cat.x * 0.04 * tang_t * tailness * catness;

        // 内部粒子迁移（region≈0.0 且 layer=1）：低幅度无规则漂动（呼吸感）
        float interior = (aLayer > 0.5) ? 1.0 : 0.0;
        vec3 drift = vec3(
          sin(uTime*0.5 + cat.y*0.7),
          cos(uTime*0.4 + cat.x*0.6),
          sin(uTime*0.6 + cat.z*0.5)
        );
        mp += drift * 0.35 * interior * catness;

        // === 底部融化：贴地那层不结成实心线，而是化作星尘往下流淌、渐渐消散 ===
        // 每个粒子有自己的下落周期(aArrival 错相)：任意时刻总有粒子在原位、
        // 有粒子半途、有粒子将尽——底面因此成为密度渐变的流苏，而非一条线
        float belly = 1.0 - smoothstep(-8.0, -5.2, cat.y);
        if (belly > 0.001) {
          float cyc  = fract(uTime*0.045*(0.55 + aArrival) + aArrival*7.31);
          float fall = cyc*cyc*(5.0 + aArrival*9.0);          // 加速下坠 5~14
          mp.y -= fall * belly * catness;
          mp.x += sin(aArrival*43.7 + uTime*0.20) * cyc * 1.1 * belly * catness; // 飘散
          mp.z += cos(aArrival*31.3 + uTime*0.17) * cyc * 0.9 * belly * catness;
          melt = belly * catness * smoothstep(0.15, 0.9, cyc); // 越落越透明
        }
      }

      vColor = aColor;
      // 冷暖渐变（沿用开屏）
      float radc = length(mp);
      float cw = smoothstep(6.0, 72.0, radc);
      vColor *= mix(vec3(0.74,0.76,0.96), vec3(0.97,0.99,1.05), cw);

      // 猫成形后：让头/耳那一片粒子色调微暖（眼神/呼吸的暗示）
      if (catness > 0.001) {
        float headness2 = 1.0 - abs(aRegion - 1.0) * 4.0; headness2 = clamp(headness2, 0.0, 1.0);
        vColor = mix(vColor, vec3(0.92, 0.85, 0.70), headness2 * 0.18 * catness);
      }

      vec4 mv = modelViewMatrix * vec4(mp, 1.0);

      // 鼠标微引力（绕流，沿用开屏）
      vec2 ss = mv.xy/mv.w;
      vec2 toM = ss - uMouse*15.0;
      float d = length(toM);
      if (d < 10.0) {
        float f = 1.0 - smoothstep(0.0, 10.0, d); f *= f;
        vec2 ddir = normalize(toM + vec2(1e-4));
        vec2 ttang = vec2(-ddir.y, ddir.x);
        mv.xy += (ttang*1.9 + ddir*0.55) * f * (1.1 + 0.4*sin(uTime*0.8 + d*0.6));
      }

      gl_Position = projectionMatrix * mv;

      // 尺寸：密度高的粒子稍微大一点 + 收敛过程中尺寸渐变；下淌的星尘渐小
      float sizeMul = mix(0.85, 1.0 + aDensity*0.6, catness);
      sizeMul *= 1.0 - melt*0.45;
      gl_PointSize = aSize * sizeMul * (160.0/-mv.z);
      vGlow = clamp((gl_PointSize-3.0)/13.0, 0.0, 1.0);

      // 慢闪（沿用开屏）
      float tw = 0.80 + 0.20*sin(uTime*0.7 + dot(mp, vec3(0.6,0.42,0.5)));
      vColor *= mix(tw, 1.0, vGlow);

      // 密度低的内部粒子在远处更透明（让身体内部更虚）；下淌的星尘渐渐消散
      float densityAlpha = mix(1.0, 0.35 + aDensity*0.65, catness);
      vAlpha = smoothstep(-900.0, -10.0, mv.z) * densityAlpha * (1.0 - melt*0.92);
    }
  `;
  const frag=`
    uniform float uOpacity;
    varying vec3 vColor;
    varying float vAlpha, vGlow;
    void main(){
      vec2 cxy = gl_PointCoord*2.0 - 1.0;
      float r = dot(cxy, cxy);
      if (r > 1.0) discard;
      float soft = pow(1.0-r, 3.5);
      float hot  = pow(1.0-r, 9.0);
      float halo = pow(1.0-r, 1.5)*0.10;
      vec3 col = vColor + vec3(0.55, 0.66, 0.9)*hot*vGlow;
      float a = mix(soft, max(soft, hot), vGlow) + halo;
      gl_FragColor = vec4(col, a*vAlpha*0.9*uOpacity);
    }
  `;
  const mat = new THREE.ShaderMaterial({
    vertexShader: vert, fragmentShader: frag,
    uniforms: {
      uTransition: { value: 0 },
      uTime:       { value: 0 },
      uMouse:      { value: new THREE.Vector2(0,0) },
      uOpacity:    { value: 0 }
    },
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  catParticleSystem = new THREE.Points(g, mat);
  scene.add(catParticleSystem);
}

// 背景星

function _createCatPlanets(){
  catPlanetGroup = new THREE.Group();
  scene.add(catPlanetGroup);

  PLANETS.forEach((P, idx)=>{
    // === 轨道线（细线，淡，AdditiveBlending）===
    const segs = 256;
    const orbitPts = new Float32Array((segs+1)*3);
    for(let i=0;i<=segs;i++){
      const t = (i/segs)*TAU;
      const [x,y,z] = orbitPosition(P, t);
      orbitPts[i*3]=x; orbitPts[i*3+1]=y; orbitPts[i*3+2]=z;
    }
    const orbitGeom = new THREE.BufferGeometry();
    orbitGeom.setAttribute('position', new THREE.BufferAttribute(orbitPts, 3));
    const orbitMat = new THREE.LineBasicMaterial({
      color: P.color,
      transparent: true,
      opacity: 0,           // 初始隐藏，跟随行星浮现
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      fog: true
    });
    const orbitLine = new THREE.Line(orbitGeom, orbitMat);
    catPlanetGroup.add(orbitLine);
    P._orbitMat = orbitMat;

    // === 行星本体 + 柔光晕（都用sprite，永远朝向相机，旋转时不会变形）===
    const coreMat = new THREE.SpriteMaterial({
      map: softSprite(), color: P.color, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const core = new THREE.Sprite(coreMat);
    const planetScale = P.main ? 1.36 : 1.0;
    core.scale.set(1.8*planetScale, 1.8*planetScale, 1);
    const spriteMat = new THREE.SpriteMaterial({
      map: softSprite(), color: P.color, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const halo = new THREE.Sprite(spriteMat);
    halo.scale.set(6*planetScale, 6*planetScale, 1);
    // 内核：边缘只虚化一点的实心球，给星球以质感
    const innerMat = new THREE.SpriteMaterial({
      map: hardSprite(), color: P.color, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const innerCore = new THREE.Sprite(innerMat);
    innerCore.scale.set(1.05*planetScale, 1.05*planetScale, 1);
    const group = new THREE.Group();
    group.add(halo);
    group.add(core);
    group.add(innerCore);
    catPlanetGroup.add(group);
    P._mesh  = group;
    P._core  = core;
    P._inner = innerCore;
    P._innerMat = innerMat;
    P._halo  = spriteMat;
    P._mat   = coreMat;
    P._baseColor  = new THREE.Color(P.color);
    P._hoverColor = new THREE.Color(0xE8954F);
    P._scale = planetScale;
    P._hover = 0;

    // 标签
    const lbl = document.createElement('div');
    lbl.className = 'planet-label';
    lbl.textContent = P.name;
    lbl.dataset.tab = P.tab || '';
    lbl.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(P.tab) finishOpening(P.tab);
    });
    document.body.appendChild(lbl);
    P._label = lbl;
  });
}

function _updateCatPlanets(t, progressIn1to2){
  const op = clamp(progressIn1to2, 0, 1);
  const mx = (targetMouse.x*0.5+0.5)*width;
  const my = (-targetMouse.y*0.5+0.5)*height;
  PLANETS.forEach((P, i)=>{
    const ang = P.phase + t * P.speed;
    const [x,y,z] = orbitPosition(P, ang);
    P._mesh.position.set(x, y, z);
    const orbitOp  = op;
    const sphereOp = Math.max(0, op - 0.15);

    // 标签屏幕投影
    const v = new THREE.Vector3(x, y, z);
    v.project(camera);
    const sx = (v.x*0.5 + 0.5) * width;
    const sy0 = (-v.y*0.5 + 0.5) * height;
    const sy = sy0 - 16;

    // hover：鼠标靠近时变橙、更亮更大；平时低调保持原色
    const dist = Math.hypot(sx-mx, sy0-my);
    const hoverTarget = (v.z < 1 && dist < 26) ? 1 : 0;
    P._hover += (hoverTarget - P._hover) * 0.15;
    const col = P._baseColor.clone().lerp(P._hoverColor, P._hover);
    P._mat.color.copy(col);
    P._halo.color.copy(col);
    P._innerMat.color.copy(col);
    P._core.scale.setScalar((1.8 + P._hover*1.6)*P._scale);
    P._inner.scale.setScalar((1.05 + P._hover*0.9)*P._scale);

    P._mat.opacity      = sphereOp * (0.85 + P._hover*0.6);
    P._halo.opacity     = sphereOp * (0.45 + P._hover*0.55);
    P._innerMat.opacity = sphereOp * (0.62 + P._hover*0.35);
    P._orbitMat.opacity = orbitOp  * 0.28;  // 轨道先出，亮一点

    if (v.z < 1 && op > 0.4) {
      P._label.style.left = sx + 'px';
      P._label.style.top  = sy + 'px';
      P._label.classList.add('show');
      P._screen = { x:sx, y:sy0, visible:true };
    } else {
      P._label.classList.remove('show');
      P._screen = { x:sx, y:sy0, visible:false };
    }
  });
}

function _initCatPhase(){
  if(catReady)return; catReady=true;
  const raw=document.getElementById('cat-data').textContent.trim();
  const cat=decodeCatCloud(raw);
  _createCatPS(cat);
  _createCatScenic(cat);
  catParticleSystem.visible=false;
}

// 猫轮廓外仍在归位的星尘 + 极少量穿过镜头的英雄粒子
function _createCatScenic(cat){
  const dustN = 380, scenicN = 44, heroN = 3, n = dustN + scenicN + heroN;
  const g = new THREE.BufferGeometry();
  const pos = new Float32Array(n*3);
  const target = new Float32Array(n*3);
  const col = new Float32Array(n*3);
  const sz  = new Float32Array(n);
  const phase = new Float32Array(n);
  const hero = new Float32Array(n);
  const TAU = Math.PI*2;
  const cs = [
    new THREE.Color(0xefe0c4),
    new THREE.Color(0xc6aa87),
    new THREE.Color(0x4a2a18),
    new THREE.Color(0x817586),
    new THREE.Color(0xe8954f)
  ];
  for(let i=0;i<n;i++){
    if(i<dustN){
      // 取真实猫轮廓附近的落点，再把粒子向外拨开：轮廓已聚出，但仍有星辰靠近
      const j=((Math.random()*COUNT)|0)*3;
      const th=Math.random()*TAU, ph=Math.acos(Math.random()*2-1);
      const r=4.0+Math.pow(Math.random(),1.35)*20.0;
      target[i*3]=cat.target[j]; target[i*3+1]=cat.target[j+1]; target[i*3+2]=cat.target[j+2];
      pos[i*3]=target[i*3]+r*Math.sin(ph)*Math.cos(th);
      pos[i*3+1]=target[i*3+1]+r*Math.cos(ph)*0.72;
      pos[i*3+2]=target[i*3+2]+r*Math.sin(ph)*Math.sin(th);
      // 不是均匀细粉：以中小颗为主，夹少量亮一些的大星尘
      const sr=Math.random();
      sz[i]=sr<0.44?rand(1.05,2.35)
           :(sr<0.73?rand(2.35,4.15)
           :(sr<0.91?rand(4.15,6.35)
           :(sr<0.985?rand(6.35,8.0):rand(8.0,9.2))));
    }else if(i<dustN+scenicN){
      // 屏幕周围的中景：避开猫的中心区，稀疏铺在宇宙纵深里
      let x,y;
      do { x=rand(-48,48); y=rand(-30,32); } while(Math.abs(x)<17&&Math.abs(y)<13);
      pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=rand(-18,36);
      target[i*3]=rand(-0.7,0.7); target[i*3+1]=rand(-0.45,0.45); target[i*3+2]=rand(-0.35,0.35);
      sz[i]=Math.random()<0.82?rand(1.8,3.8):rand(3.8,5.6);
      hero[i]=0.5;
    }else{
      // 只有几颗近镜英雄粒子，横穿视野；它们清晰、快，但不抢猫
      const dir=Math.random()<0.5?-1:1;
      pos[i*3]=dir*rand(38,58); pos[i*3+1]=rand(-22,24); pos[i*3+2]=rand(24,46);
      target[i*3]=-dir; target[i*3+1]=rand(-0.16,0.16); target[i*3+2]=rand(-0.08,0.08);
      sz[i]=rand(3.8,6.8); hero[i]=1;
    }
    const colorRoll = Math.random();
    const c = colorRoll < 0.08 ? cs[4] : cs[(Math.random()*4)|0];
    // 猫周围保持暗一些，靠呼吸浮现；中景和英雄粒子维持原亮度
    const b = i<dustN ? 0.30+Math.random()*0.34 : 0.52+Math.random()*0.42;
    col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
    phase[i]=Math.random();
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('aTarget',  new THREE.BufferAttribute(target,3));
  g.setAttribute('color',    new THREE.BufferAttribute(col,3));
  g.setAttribute('size',     new THREE.BufferAttribute(sz,1));
  g.setAttribute('aPhase',   new THREE.BufferAttribute(phase,1));
  g.setAttribute('aHero',    new THREE.BufferAttribute(hero,1));
  const mat = new THREE.ShaderMaterial({
    uniforms:{ uOpacity:{value:0.0}, uTime:{value:0.0} },
    vertexShader:`uniform float uTime;
      attribute float size, aPhase, aHero; attribute vec3 color, aTarget;
      varying vec3 vC; varying float vHero, vPulse;
      void main(){
        vec3 mp=position;
        float sizeBreath=1.0;
        if(aHero<0.25){
          float cycle=fract(uTime*0.042+aPhase);
          float gather=cycle*cycle*(3.0-2.0*cycle);
          mp=mix(position,aTarget,gather*0.78);
          vec3 radial=normalize(position-aTarget+vec3(1e-4));
          mp += vec3(-radial.z,radial.y*0.15,radial.x)*sin(cycle*3.14159)*0.65;
          float breath=pow(0.5+0.5*sin(uTime*0.30+aPhase*18.0),1.35);
          // 每颗星尘错峰从暗处呼吸到亮处，再缓慢沉回去
          vPulse=(1.0-smoothstep(0.79,1.0,cycle))*smoothstep(0.0,0.14,cycle)*(0.18+breath*0.82);
          sizeBreath=0.86+breath*0.24;
        }else if(aHero<0.75){
          // 周围前中景只做轻微漂移，保持画面有呼吸而不是下雪
          mp.x+=sin(uTime*0.10+aPhase*17.0)*aTarget.x;
          mp.y+=cos(uTime*0.085+aPhase*13.0)*aTarget.y;
          mp.z+=sin(uTime*0.07+aPhase*11.0)*aTarget.z;
          vPulse=0.72+0.20*sin(uTime*0.16+aPhase*19.0);
        }else{
          float travel=fract(uTime*(0.035+0.012*aPhase)+aPhase);
          mp.x=mix(position.x,-position.x,travel);
          mp.y+=aTarget.y*travel*32.0+sin(travel*3.14159)*2.0;
          mp.z+=aTarget.z*travel*20.0;
          vPulse=sin(travel*3.14159);
        }
        vC=color; vHero=aHero;
        vec4 mv=modelViewMatrix*vec4(mp,1.0);
        gl_PointSize=size*sizeBreath*mix(165.0,250.0,aHero)/max(8.0,-mv.z);
        gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`uniform float uOpacity; varying vec3 vC; varying float vHero, vPulse;
      void main(){
        vec2 p=gl_PointCoord*2.0-1.0; float r=dot(p,p); if(r>1.0) discard;
        float core=pow(1.0-r,mix(5.0,3.2,vHero));
        float halo=pow(1.0-r,1.4)*mix(0.10,0.22,vHero);
        float layerAlpha=vHero<0.25?0.52:(vHero<0.75?0.66:0.62);
        float alpha=(core+halo)*layerAlpha*vPulse*uOpacity;
        gl_FragColor=vec4(vC+vec3(0.18,0.22,0.34)*core,alpha);
      }`,
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  catScenicSys = new THREE.Points(g, mat);
  catScenicSys.frustumCulled = false;
  scene.add(catScenicSys);
}
</script>
